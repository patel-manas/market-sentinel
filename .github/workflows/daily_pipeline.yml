name: Market Sentinel Daily Pipeline

on:
  workflow_dispatch: # Allows manual trigger from GitHub UI
  schedule:
    - cron: '30 3 * * 1-5' # Automatically runs Mon-Fri at 3:30 AM UTC (9:00 AM IST)

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Market Collectors
        run: python main.py